<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Database Quotes</title>
  
  <!-- Memuat Tailwind CSS untuk styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Memuat React langsung ke browser -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Memuat Babel untuk menerjemahkan kode React (JSX) secara otomatis di browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <!-- Tempat aplikasi akan di-render -->
  <div id="root"></div>

  <!-- Script Aplikasi (Perhatikan type="text/babel" dan data-type="module") -->
  <script type="text/babel" data-type="module">
    // 1. Import Firebase versi CDN khusus browser
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js';
    import { getFirestore, collection, onSnapshot, doc, addDoc, updateDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';

    const { useState, useEffect } = React;

    // 2. Ikon SVG Manual
    const Plus = ({ size = 16 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const Edit2 = ({ size = 14 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>;
    const Copy = ({ size = 14 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>;
    const Trash2 = ({ size = 14 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
    const Check = ({ size = 14 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
    const SettingsIcon = ({ size = 16 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
    const FolderIcon = ({ size = 14 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>;

    // 3. Konfigurasi Firebase Anda
    const firebaseConfig = {
      apiKey: "AIzaSyDyx1sfyaz6eEcbd9TtlFREQSlpiNKjKts",
      authDomain: "wa-template-90a0d.firebaseapp.com",
      databaseURL: "https://wa-template-90a0d-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "wa-template-90a0d",
      storageBucket: "wa-template-90a0d.firebasestorage.app",
      messagingSenderId: "803214078238",
      appId: "1:803214078238:web:c91f88e8ddde74b149190f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Peta Warna untuk Inisial Akun
    const badgeColors = {
        red: 'bg-red-500 text-white border-red-500',
        emerald: 'bg-emerald-500 text-white border-emerald-500',
        indigo: 'bg-indigo-500 text-white border-indigo-500',
        amber: 'bg-amber-500 text-white border-amber-500',
        purple: 'bg-purple-500 text-white border-purple-500',
        pink: 'bg-pink-500 text-white border-pink-500',
        blue: 'bg-blue-500 text-white border-blue-500',
        teal: 'bg-teal-500 text-white border-teal-500'
    };

    // Peta Warna Khusus untuk Label Kategori
    const catColorMap = {
        indigo: { bg: 'bg-indigo-600', text: 'text-indigo-600', dot: 'bg-indigo-500' },
        rose: { bg: 'bg-rose-500', text: 'text-rose-600', dot: 'bg-rose-500' },
        emerald: { bg: 'bg-emerald-500', text: 'text-emerald-600', dot: 'bg-emerald-500' },
        amber: { bg: 'bg-amber-500', text: 'text-amber-600', dot: 'bg-amber-500' },
        slate: { bg: 'bg-slate-700', text: 'text-slate-700', dot: 'bg-slate-600' }
    };

    // 4. Komponen Utama Aplikasi
    function App() {
      const [categories, setCategories] = useState([]);
      const [quotes, setQuotes] = useState([]);
      const [accounts, setAccounts] = useState([]); // State untuk menyimpan daftar akun
      
      const [selectedCategory, setSelectedCategory] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      const [errorMsg, setErrorMsg] = useState('');

      const [showCatModal, setShowCatModal] = useState(false);
      const [newCatName, setNewCatName] = useState('');
      const [editingCatId, setEditingCatId] = useState(null);
      const [newCatColor, setNewCatColor] = useState('indigo');

      const [showQuoteModal, setShowQuoteModal] = useState(false);
      const [editingQuote, setEditingQuote] = useState(null);
      const [quoteForm, setQuoteForm] = useState({ textId: '', textEn: '' });

      const [showSettingsModal, setShowSettingsModal] = useState(false);
      const [newAccInitial, setNewAccInitial] = useState('');
      const [newAccColor, setNewAccColor] = useState('indigo');

      const [copiedId, setCopiedId] = useState(null);

      // State untuk Dialog Pindah Kategori
      const [moveDialog, setMoveDialog] = useState({ isOpen: false, quoteId: null, targetCategory: '' });

      // State untuk Custom Confirm Dialog
      const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, title: '', message: '', actionText: '', actionColor: 'indigo', onConfirm: null });
      const closeConfirmDialog = () => setConfirmDialog(prev => ({ ...prev, isOpen: false }));

      // Mengambil Data dari Firestore
      useEffect(() => {
        const catRef = collection(db, 'categories');
        const quoteRef = collection(db, 'quotes');
        const accRef = collection(db, 'accounts');

        const unsubCat = onSnapshot(catRef, (snapshot) => {
          const catData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          catData.sort((a, b) => new Date(a.createdAt || 0) - new Date(b.createdAt || 0));
          
          // Inject Kategori Draft
          const finalCategories = [
              { id: 'draft', name: '📥 Draft (Inbox)', color: 'slate', isVirtual: true },
              ...catData
          ];
          
          setCategories(finalCategories);
          setSelectedCategory(prev => prev ? prev : 'draft');
        });

        const unsubQuotes = onSnapshot(quoteRef, (snapshot) => {
          const quoteData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          quoteData.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
          setQuotes(quoteData);
          setIsLoading(false);
        });

        const unsubAcc = onSnapshot(accRef, (snapshot) => {
          const accData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          accData.sort((a, b) => new Date(a.createdAt || 0) - new Date(b.createdAt || 0));
          setAccounts(accData);
        });

        return () => {
          unsubCat();
          unsubQuotes();
          unsubAcc();
        };
      }, []);

      // Handler Pengaturan Akun (Settings)
      const handleSaveAccount = async (e) => {
        e.preventDefault();
        if (!newAccInitial.trim()) return;
        try {
            await addDoc(collection(db, 'accounts'), {
                initial: newAccInitial.trim(),
                color: newAccColor,
                createdAt: new Date().toISOString()
            });
            setNewAccInitial('');
        } catch(e) {
            alert('Gagal menambah akun: ' + e.message);
        }
      };

      const handleDeleteAccount = async (id) => {
        setConfirmDialog({
            isOpen: true,
            title: 'Hapus Akun',
            message: 'Hapus akun penanda ini dari pengaturan?',
            actionText: 'Hapus',
            actionColor: 'rose',
            onConfirm: async () => {
                await deleteDoc(doc(db, 'accounts', id));
                closeConfirmDialog();
            }
        });
      };

      // Handler Menandai Penggunaan Quote (Toggle Usage)
      const toggleUsage = async (quoteId, accountId, lang, quoteText) => {
          const quote = quotes.find(q => q.id === quoteId);
          if (!quote) return;
          
          const field = lang === 'id' ? 'usedOnId' : 'usedOnEn';
          const currentList = quote[field] || [];
          const isUsed = currentList.includes(accountId);
          
          const account = accounts.find(a => a.id === accountId);
          const accName = account ? account.initial : 'Akun ini';

          if (!isUsed) {
              setConfirmDialog({
                  isOpen: true,
                  title: 'Tandai & Salin',
                  message: `Tandai quote ini sudah dipakai di ${accName} sekaligus salin teksnya?`,
                  actionText: 'Ya, Salin',
                  actionColor: 'indigo',
                  onConfirm: async () => {
                      const newList = [...currentList, accountId];
                      try {
                          await updateDoc(doc(db, 'quotes', quoteId), {
                              [field]: newList
                          });
                          if (quoteText) handleCopy(quoteText, `${quoteId}-${lang}`);
                      } catch(e) {
                          console.error('Gagal update status:', e);
                      }
                      closeConfirmDialog();
                  }
              });
          } else {
              setConfirmDialog({
                  isOpen: true,
                  title: 'Batalkan Penanda',
                  message: `Batalkan tanda sudah dipakai di ${accName}?`,
                  actionText: 'Batalkan Tanda',
                  actionColor: 'rose',
                  onConfirm: async () => {
                      const newList = currentList.filter(id => id !== accountId);
                      try {
                          await updateDoc(doc(db, 'quotes', quoteId), {
                              [field]: newList
                          });
                      } catch(e) {
                          console.error('Gagal update status:', e);
                      }
                      closeConfirmDialog();
                  }
              });
          }
      };

      // Handler Kategori
      const handleOpenCatModal = (cat = null) => {
        setErrorMsg('');
        if (cat) {
            setEditingCatId(cat.id);
            setNewCatName(cat.name);
            setNewCatColor(cat.color || 'indigo');
        } else {
            setEditingCatId(null);
            setNewCatName('');
            setNewCatColor('indigo');
        }
        setShowCatModal(true);
      };

      const handleSaveCategory = async (e) => {
        e.preventDefault(); 
        if (!newCatName.trim()) return;
        try {
          setErrorMsg('');
          if (editingCatId) {
              await updateDoc(doc(db, 'categories', editingCatId), {
                  name: newCatName.trim(),
                  color: newCatColor
              });
          } else {
              await addDoc(collection(db, 'categories'), { 
                name: newCatName.trim(),
                color: newCatColor,
                createdAt: new Date().toISOString()
              });
          }
          setShowCatModal(false);
        } catch (error) {
          setErrorMsg(`Gagal menyimpan: ${error.message}`);
        }
      };

      const handleDeleteCategory = (catId) => {
        setConfirmDialog({
            isOpen: true,
            title: 'Hapus Kategori',
            message: 'Hapus kategori ini? (Quotes di dalamnya tidak akan ikut terhapus, namun akan kehilangan label kategorinya)',
            actionText: 'Ya, Hapus Kategori',
            actionColor: 'rose',
            onConfirm: async () => {
                try {
                    await deleteDoc(doc(db, 'categories', catId));
                    if (selectedCategory === catId) setSelectedCategory(null);
                } catch (error) {
                    alert("Gagal menghapus: " + error.message);
                }
                closeConfirmDialog();
            }
        });
      };

      // Handler Quote
      const handleOpenQuoteModal = (quote = null) => {
        setErrorMsg('');
        if (quote) {
          setEditingQuote(quote);
          setQuoteForm({ textId: quote.textId, textEn: quote.textEn });
        } else {
          setEditingQuote(null);
          setQuoteForm({ textId: '', textEn: '' });
        }
        setShowQuoteModal(true);
      };

      const handleSaveQuote = async (e) => {
        e.preventDefault();
        if (!quoteForm.textId.trim() && !quoteForm.textEn.trim()) {
            setErrorMsg('Harap isi minimal salah satu quote (Indonesia atau English).');
            return;
        }
        if (!selectedCategory) return;

        try {
          setErrorMsg('');
          const quoteRef = collection(db, 'quotes');
          
          if (editingQuote) {
            await updateDoc(doc(db, 'quotes', editingQuote.id), {
              textId: quoteForm.textId.trim(),
              textEn: quoteForm.textEn.trim()
            });
          } else {
            await addDoc(quoteRef, {
              categoryId: selectedCategory,
              textId: quoteForm.textId.trim(),
              textEn: quoteForm.textEn.trim(),
              usedOnId: [], // Array penanda awal untuk ID
              usedOnEn: [], // Array penanda awal untuk EN
              createdAt: new Date().toISOString()
            });
          }
          setShowQuoteModal(false);
        } catch (error) {
          setErrorMsg(`Gagal menyimpan: ${error.message}`);
        }
      };

      const handleDeleteQuote = async (id) => {
        setConfirmDialog({
            isOpen: true,
            title: 'Hapus Quote',
            message: 'Hapus quote ini secara permanen dari database?',
            actionText: 'Hapus',
            actionColor: 'rose',
            onConfirm: async () => {
                try {
                    await deleteDoc(doc(db, 'quotes', id));
                } catch (error) {
                    alert("Gagal menghapus: " + error.message);
                }
                closeConfirmDialog();
            }
        });
      };

      // Handler Copy Teks
      const handleCopy = (text, id) => {
        if (!text) return; 
        const copyFallback = () => {
          const textArea = document.createElement("textarea");
          textArea.value = text;
          document.body.appendChild(textArea);
          textArea.select();
          try {
            document.execCommand('copy');
            showCopiedFeedback(id);
          } catch (err) {
            console.error('Gagal copy text', err);
          }
          document.body.removeChild(textArea);
        };

        if (navigator.clipboard && window.isSecureContext) {
          navigator.clipboard.writeText(text)
            .then(() => showCopiedFeedback(id))
            .catch(() => copyFallback());
        } else {
          copyFallback();
        }
      };

      const showCopiedFeedback = (id) => {
        setCopiedId(id);
        setTimeout(() => setCopiedId(null), 2000);
      };

      const filteredQuotes = quotes.filter(q => q.categoryId === selectedCategory);
      const activeCategoryName = categories.find(c => c.id === selectedCategory)?.name || "Pilih Kategori";

      if (isLoading) {
        return <div className="min-h-screen flex items-center justify-center bg-white text-indigo-600 font-bold animate-pulse">Memuat database...</div>;
      }

      return (
        <div className="min-h-screen bg-white flex text-gray-800 font-sans">
          
          {/* SIDEBAR - KATEGORI */}
          <aside className="w-64 border-r border-gray-200 p-6 flex flex-col hidden md:flex h-screen">
            <div className="mb-8">
              <h1 className="text-xl font-bold text-indigo-900 tracking-tight">Quotes.db</h1>
              <p className="text-xs text-gray-500 mt-1">Bank Konten Instagram</p>
            </div>

            <div className="flex-1 overflow-y-auto space-y-2 pr-1">
              {categories.map(cat => {
                const isSelected = selectedCategory === cat.id;
                const cColor = catColorMap[cat.color || 'indigo'];
                
                return (
                  <div key={cat.id} className="relative group flex items-center">
                    <button
                      onClick={() => setSelectedCategory(cat.id)}
                      className={`w-full text-left px-4 py-3 rounded-md transition-colors font-medium text-sm pr-16 flex items-center gap-2 ${
                        isSelected 
                          ? `${cColor.bg} text-white shadow-sm` 
                          : 'bg-slate-50 text-slate-700 hover:bg-slate-100'
                      }`}
                    >
                      {!isSelected && <span className={`w-2 h-2 rounded-full ${cColor.dot}`}></span>}
                      <span className="truncate">{cat.name}</span>
                    </button>
                    {!cat.isVirtual && (
                      <div className="absolute right-2 hidden group-hover:flex gap-1">
                        <button onClick={(e) => { e.stopPropagation(); handleOpenCatModal(cat); }} className={`p-1.5 rounded-md ${isSelected ? 'text-white hover:bg-white/20' : 'text-slate-400 hover:text-amber-600 hover:bg-amber-50'} transition-colors`} title="Edit Kategori"><Edit2 size={12}/></button>
                        <button onClick={(e) => { e.stopPropagation(); handleDeleteCategory(cat.id); }} className={`p-1.5 rounded-md ${isSelected ? 'text-white hover:bg-white/20' : 'text-slate-400 hover:text-rose-600 hover:bg-rose-50'} transition-colors`} title="Hapus Kategori"><Trash2 size={12}/></button>
                      </div>
                    )}
                  </div>
                );
              })}
              {categories.length === 0 && (
                <p className="text-sm text-gray-400 italic">Belum ada kategori.</p>
              )}
            </div>

            <div className="mt-auto pt-4 border-t border-gray-200">
              <button 
                onClick={() => handleOpenCatModal()}
                className="mb-4 flex items-center justify-center gap-2 w-full bg-slate-800 hover:bg-slate-900 text-white px-4 py-3 rounded-md font-medium text-sm transition-colors shadow-sm"
              >
                <Plus /> Kategori Baru
              </button>
            </div>
          </aside>

          {/* AREA UTAMA - TABEL QUOTES */}
          <main className="flex-1 p-6 lg:p-10 h-screen overflow-y-auto">
            
            {/* Mobile Header */}
            <div className="md:hidden flex items-center justify-between mb-6 pb-4 border-b border-gray-200">
              <h1 className="text-xl font-bold text-indigo-900">Quotes.db</h1>
              <button 
                onClick={() => handleOpenCatModal()}
                className="text-indigo-600 font-semibold text-sm flex items-center gap-1"
              >
                <Plus size={16} /> Kategori
              </button>
            </div>

            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
              <div>
                <h2 className="text-2xl font-bold text-gray-900">{activeCategoryName}</h2>
                <p className="text-sm text-gray-500 mt-1">{filteredQuotes.length} quotes tersimpan</p>
              </div>
              
              <div className="flex gap-3 w-full md:w-auto">
                <select 
                  className="md:hidden flex-1 border border-gray-300 rounded-md px-3 py-2 text-sm bg-white font-bold"
                  value={selectedCategory || ''}
                  onChange={(e) => setSelectedCategory(e.target.value)}
                >
                  {categories.map(cat => (
                    <option key={cat.id} value={cat.id}>{cat.name}</option>
                  ))}
                </select>
                
                {/* TOMBOL TAMBAH QUOTE & SETTINGS AKUN */}
                <div className="flex items-center gap-2">
                  <button
                    onClick={() => handleOpenQuoteModal()}
                    disabled={!selectedCategory}
                    className={`flex items-center justify-center gap-2 px-6 py-2.5 rounded-md font-bold text-sm transition-colors ${
                      selectedCategory 
                        ? 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-sm' 
                        : 'bg-gray-200 text-gray-400 cursor-not-allowed'
                    }`}
                  >
                    <Plus /> Tambah Quote
                  </button>
                  <button
                    onClick={() => setShowSettingsModal(true)}
                    className="p-2.5 bg-white border border-gray-300 hover:bg-gray-50 rounded-md text-gray-600 shadow-sm transition-colors"
                    title="Pengaturan Penanda Akun"
                  >
                    <SettingsIcon />
                  </button>
                </div>
              </div>
            </div>

            {/* TABEL */}
            {filteredQuotes.length > 0 ? (
              <div className="overflow-hidden border border-gray-200 rounded-lg shadow-sm">
                <table className="min-w-full divide-y divide-gray-200">
                  <thead className="bg-slate-50">
                    <tr>
                      <th scope="col" className="px-6 py-4 text-left text-xs font-bold text-slate-600 uppercase tracking-wider w-1/2 border-r border-gray-200">
                        Indonesia
                      </th>
                      <th scope="col" className="px-6 py-4 text-left text-xs font-bold text-slate-600 uppercase tracking-wider w-1/2">
                        English
                      </th>
                    </tr>
                  </thead>
                  <tbody className="bg-white divide-y divide-gray-200">
                    {filteredQuotes.map((quote, index) => (
                      <tr key={quote.id} className={`${index % 2 === 0 ? 'bg-white' : 'bg-slate-50'} hover:bg-indigo-50/40 transition-colors`}>
                        
                        {/* KOLOM INDONESIA */}
                        <td className="px-5 py-4 align-top border-r border-gray-200 w-1/2">
                          <div className="flex flex-col h-full">
                            <p className="text-sm text-slate-800 whitespace-pre-wrap leading-relaxed font-medium mb-2">
                              {quote.textId}
                            </p>
                            
                            {/* Area Bawah: Indikator Kiri & Aksi Kanan */}
                            <div className="flex justify-between items-end mt-auto pt-2">
                              {/* Kiri: Indikator Akun */}
                              <div className="flex flex-wrap gap-1.5">
                                {accounts.map(acc => {
                                  const isUsed = (quote.usedOnId || []).includes(acc.id);
                                  return (
                                    <button
                                      key={acc.id}
                                      onClick={() => toggleUsage(quote.id, acc.id, 'id', quote.textId)}
                                      title={isUsed ? `Sudah dipakai di ${acc.initial}` : `Tandai dipakai di ${acc.initial} & Salin`}
                                      className={`text-[9px] font-bold px-2 py-0.5 rounded border transition-colors ${
                                        isUsed ? badgeColors[acc.color] : 'bg-white text-slate-400 border-slate-300 hover:border-slate-400'
                                      }`}
                                    >
                                      {acc.initial}
                                    </button>
                                  );
                                })}
                              </div>

                              {/* Kanan: Aksi */}
                              <div className="flex gap-2 opacity-70 hover:opacity-100 transition-opacity ml-4 shrink-0">
                                <button
                                  onClick={() => handleCopy(quote.textId, `${quote.id}-id`)}
                                  className={`p-2 rounded-md transition-colors shadow-sm ${quote.textId ? 'bg-slate-200 hover:bg-sky-100 text-slate-600 hover:text-sky-700' : 'bg-slate-100 text-slate-300 cursor-not-allowed'}`}
                                  title="Copy Indonesia"
                                  disabled={!quote.textId}
                                >
                                  {copiedId === `${quote.id}-id` ? <Check size={14}/> : <Copy size={14}/>}
                                </button>
                                <button
                                  onClick={() => {
                                      const target = categories.find(c => !c.isVirtual)?.id || '';
                                      setMoveDialog({ isOpen: true, quoteId: quote.id, targetCategory: target });
                                  }}
                                  className="p-2 bg-slate-200 hover:bg-indigo-100 text-slate-600 hover:text-indigo-700 rounded-md transition-colors shadow-sm"
                                  title="Pindahkan Kategori"
                                >
                                  <FolderIcon size={14}/>
                                </button>
                                <button
                                  onClick={() => handleOpenQuoteModal(quote)}
                                  className="p-2 bg-slate-200 hover:bg-amber-100 text-slate-600 hover:text-amber-700 rounded-md transition-colors shadow-sm"
                                  title="Edit Quote"
                                >
                                  <Edit2 size={14}/>
                                </button>
                                <button
                                  onClick={() => handleDeleteQuote(quote.id)}
                                  className="p-2 bg-slate-200 hover:bg-rose-100 text-slate-600 hover:text-rose-700 rounded-md transition-colors shadow-sm"
                                  title="Hapus Quote"
                                >
                                  <Trash2 size={14}/>
                                </button>
                              </div>
                            </div>
                          </div>
                        </td>

                        {/* KOLOM ENGLISH */}
                        <td className="px-5 py-4 align-top w-1/2">
                          <div className="flex flex-col h-full">
                            <p className="text-sm text-slate-700 whitespace-pre-wrap leading-relaxed font-serif italic mb-2">
                              {quote.textEn}
                            </p>
                            
                            {/* Area Bawah: Indikator Kiri & Aksi Kanan */}
                            <div className="flex justify-between items-end mt-auto pt-2">
                              {/* Kiri: Indikator Akun */}
                              <div className="flex flex-wrap gap-1.5">
                                {accounts.map(acc => {
                                  const isUsed = (quote.usedOnEn || []).includes(acc.id);
                                  return (
                                    <button
                                      key={acc.id}
                                      onClick={() => toggleUsage(quote.id, acc.id, 'en', quote.textEn)}
                                      title={isUsed ? `Sudah dipakai di ${acc.initial}` : `Tandai dipakai di ${acc.initial} & Salin`}
                                      className={`text-[9px] font-bold px-2 py-0.5 rounded border transition-colors ${
                                        isUsed ? badgeColors[acc.color] : 'bg-white text-slate-400 border-slate-300 hover:border-slate-400'
                                      }`}
                                    >
                                      {acc.initial}
                                    </button>
                                  );
                                })}
                              </div>

                              {/* Kanan: Aksi */}
                              <div className="flex gap-2 opacity-70 hover:opacity-100 transition-opacity ml-4 shrink-0">
                                <button
                                  onClick={() => handleCopy(quote.textEn, `${quote.id}-en`)}
                                  className={`p-2 rounded-md transition-colors shadow-sm ${quote.textEn ? 'bg-slate-200 hover:bg-emerald-100 text-slate-600 hover:text-emerald-700' : 'bg-slate-100 text-slate-300 cursor-not-allowed'}`}
                                  title="Copy English"
                                  disabled={!quote.textEn}
                                >
                                  {copiedId === `${quote.id}-en` ? <Check size={14}/> : <Copy size={14}/>}
                                </button>
                                <button
                                  onClick={() => {
                                      const target = categories.find(c => !c.isVirtual)?.id || '';
                                      setMoveDialog({ isOpen: true, quoteId: quote.id, targetCategory: target });
                                  }}
                                  className="p-2 bg-slate-200 hover:bg-indigo-100 text-slate-600 hover:text-indigo-700 rounded-md transition-colors shadow-sm"
                                  title="Pindahkan Kategori"
                                >
                                  <FolderIcon size={14}/>
                                </button>
                                <button
                                  onClick={() => handleOpenQuoteModal(quote)}
                                  className="p-2 bg-slate-200 hover:bg-amber-100 text-slate-600 hover:text-amber-700 rounded-md transition-colors shadow-sm"
                                  title="Edit Quote"
                                >
                                  <Edit2 size={14}/>
                                </button>
                                <button
                                  onClick={() => handleDeleteQuote(quote.id)}
                                  className="p-2 bg-slate-200 hover:bg-rose-100 text-slate-600 hover:text-rose-700 rounded-md transition-colors shadow-sm"
                                  title="Hapus Quote"
                                >
                                  <Trash2 size={14}/>
                                </button>
                              </div>
                            </div>
                          </div>
                        </td>

                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            ) : (
              <div className="text-center py-20 bg-slate-50 border border-slate-200 border-dashed rounded-lg">
                <p className="text-slate-500 mb-4 text-sm">Belum ada quote di kategori ini.</p>
                {selectedCategory && (
                  <button
                    onClick={() => handleOpenQuoteModal()}
                    className="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-md font-bold text-sm inline-flex items-center gap-2 transition-colors shadow-sm"
                  >
                    <Plus /> Tambah Quote Pertama
                  </button>
                )}
              </div>
            )}
          </main>

          {/* MODAL: PENGATURAN AKUN INSTAGRAM */}
          {showSettingsModal && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden animate-[fadeIn_0.2s_ease-out]">
                <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-slate-50">
                  <h3 className="font-bold text-lg text-slate-800 flex items-center gap-2">
                    ⚙️ Pengaturan Penanda Akun
                  </h3>
                  <button onClick={() => setShowSettingsModal(false)} className="text-slate-400 hover:text-slate-600">
                    ✕
                  </button>
                </div>
                <div className="p-6">
                  {/* Daftar Akun */}
                  <div className="mb-6">
                    <label className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block">Daftar Akun Saat Ini</label>
                    {accounts.length === 0 ? (
                      <p className="text-sm text-slate-400 italic bg-slate-50 p-3 rounded-lg border border-slate-100 text-center">Belum ada akun penanda ditambahkan.</p>
                    ) : (
                      <ul className="space-y-2 max-h-48 overflow-y-auto">
                        {accounts.map(acc => (
                          <li key={acc.id} className="flex justify-between items-center bg-slate-50 border border-slate-200 p-2 rounded-lg">
                            <div className="flex items-center gap-3">
                              <span className={`text-[10px] font-bold px-2 py-0.5 rounded ${badgeColors[acc.color]}`}>
                                {acc.initial}
                              </span>
                            </div>
                            <button onClick={() => handleDeleteAccount(acc.id)} className="text-rose-500 hover:bg-rose-100 p-1.5 rounded-md transition-colors" title="Hapus Akun">
                              <Trash2 size={12}/>
                            </button>
                          </li>
                        ))}
                      </ul>
                    )}
                  </div>

                  {/* Form Tambah Akun Baru */}
                  <form onSubmit={handleSaveAccount} className="border-t border-gray-200 pt-6">
                    <label className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3 block">Tambah Akun Baru</label>
                    <div className="flex gap-2">
                      <input
                        type="text"
                        required
                        placeholder="Inisial (Cth: IG 1)"
                        className="flex-1 bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm font-medium"
                        value={newAccInitial}
                        onChange={(e) => setNewAccInitial(e.target.value)}
                        maxLength={6}
                      />
                      <select
                        className="bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm font-bold text-slate-600"
                        value={newAccColor}
                        onChange={(e) => setNewAccColor(e.target.value)}
                      >
                        <option value="indigo">Indigo</option>
                        <option value="red">Merah</option>
                        <option value="emerald">Hijau</option>
                        <option value="amber">Kuning</option>
                        <option value="blue">Biru</option>
                        <option value="purple">Ungu</option>
                        <option value="pink">Pink</option>
                        <option value="teal">Teal</option>
                      </select>
                    </div>
                    <button 
                      type="submit"
                      className="mt-3 w-full py-2.5 text-sm font-bold bg-slate-800 hover:bg-slate-900 text-white rounded-lg transition-colors shadow-md"
                    >
                      + Tambahkan Akun
                    </button>
                  </form>
                </div>
              </div>
            </div>
          )}

          {/* MODAL: TAMBAH KATEGORI */}
          {showCatModal && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden animate-[fadeIn_0.2s_ease-out]">
                <div className="px-6 py-4 border-b border-gray-100">
                  <h3 className="font-bold text-lg text-slate-800">{editingCatId ? '✏️ Edit Kategori' : '📁 Kategori Baru'}</h3>
                </div>
                <form onSubmit={handleSaveCategory} className="p-6">
                  {errorMsg && (
                    <div className="mb-4 p-3 bg-rose-50 border border-rose-200 text-rose-600 text-xs rounded-lg font-mono">
                      {errorMsg}
                    </div>
                  )}
                  <div className="mb-4">
                    <label className="text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-2 block">Nama Kategori</label>
                    <input
                      type="text"
                      autoFocus
                      required
                      placeholder="Misal: Romance, Motivation..."
                      className="w-full bg-white border border-slate-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm font-medium"
                      value={newCatName}
                      onChange={(e) => setNewCatName(e.target.value)}
                    />
                  </div>
                  <div className="mb-6">
                    <label className="text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-2 block">Warna Label</label>
                    <div className="flex gap-2">
                      {Object.keys(catColorMap).map(color => (
                        <button 
                          type="button" 
                          key={color} 
                          onClick={() => setNewCatColor(color)} 
                          className={`w-8 h-8 rounded-full ${catColorMap[color].bg} ${newCatColor === color ? 'ring-2 ring-offset-2 ring-slate-400 scale-110' : 'opacity-60 hover:opacity-100'} transition-all shadow-sm`}
                          title={`Warna ${color}`}
                        ></button>
                      ))}
                    </div>
                  </div>
                  <div className="flex gap-3 justify-end">
                    <button 
                      type="button"
                      onClick={() => setShowCatModal(false)}
                      className="px-5 py-2.5 text-sm font-bold text-slate-600 hover:bg-slate-100 rounded-lg transition-colors"
                    >
                      BATAL
                    </button>
                    <button 
                      type="submit"
                      className="px-5 py-2.5 text-sm font-bold bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg transition-colors shadow-md"
                    >
                      SIMPAN
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* MODAL: TAMBAH / EDIT QUOTE */}
          {showQuoteModal && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-4xl overflow-hidden flex flex-col max-h-[95vh] animate-[fadeIn_0.2s_ease-out]">
                <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-slate-50">
                  <h3 className="font-bold text-lg text-slate-800 flex items-center gap-2">
                    {editingQuote ? '✏️ Edit Quote' : '✨ Tambah Quote Baru'}
                  </h3>
                  <span className="bg-indigo-100 text-indigo-700 border border-indigo-200 text-xs font-bold px-3 py-1 rounded-full shadow-sm">
                    Kategori: {activeCategoryName}
                  </span>
                </div>
                
                <form onSubmit={handleSaveQuote} className="flex flex-col flex-1 overflow-hidden">
                  <div className="p-6 overflow-y-auto flex-1 flex flex-col md:flex-row gap-6">
                    {errorMsg && (
                      <div className="md:col-span-2 w-full p-3 bg-rose-50 border border-rose-200 text-rose-600 text-xs rounded-lg font-mono">
                        {errorMsg}
                      </div>
                    )}
                    <div className="flex-1 flex flex-col gap-2">
                      <label className="text-[11px] font-bold text-slate-500 uppercase tracking-wider">Teks Indonesia</label>
                      <textarea
                        className="w-full flex-1 min-h-[200px] bg-white border border-slate-300 rounded-xl p-4 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none shadow-sm font-medium"
                        placeholder="Ketik quote bahasa Indonesia di sini..."
                        value={quoteForm.textId}
                        onChange={(e) => setQuoteForm({...quoteForm, textId: e.target.value})}
                      ></textarea>
                    </div>
                    <div className="flex-1 flex flex-col gap-2">
                      <label className="text-[11px] font-bold text-slate-500 uppercase tracking-wider">English Text</label>
                      <textarea
                        className="w-full flex-1 min-h-[200px] bg-white border border-slate-300 rounded-xl p-4 text-sm font-serif italic focus:outline-none focus:ring-2 focus:ring-emerald-500 resize-none shadow-sm"
                        placeholder="Type the English translation here..."
                        value={quoteForm.textEn}
                        onChange={(e) => setQuoteForm({...quoteForm, textEn: e.target.value})}
                      ></textarea>
                    </div>
                  </div>

                  <div className="px-6 py-4 border-t border-gray-200 flex justify-end gap-3 bg-slate-50">
                    <button 
                      type="button"
                      onClick={() => setShowQuoteModal(false)}
                      className="px-6 py-2.5 text-sm font-bold text-slate-600 hover:bg-slate-200 rounded-lg transition-colors"
                    >
                      BATAL
                    </button>
                    <button 
                      type="submit"
                      className="px-6 py-2.5 text-sm font-bold bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg transition-colors shadow-md"
                    >
                      {editingQuote ? 'SIMPAN PERUBAHAN' : 'TAMBAHKAN QUOTE'}
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* MODAL: CONFIRM DIALOG CUSTOM */}
          {confirmDialog.isOpen && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-[70]">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-xs overflow-hidden animate-[fadeIn_0.15s_ease-out] border border-slate-100">
                <div className="p-6 text-center">
                  <div className={`mx-auto w-12 h-12 mb-4 rounded-full flex items-center justify-center ${confirmDialog.actionColor === 'rose' ? 'bg-rose-100 text-rose-500' : 'bg-indigo-100 text-indigo-500'}`}>
                    {confirmDialog.actionColor === 'rose' ? <Trash2 size={24} /> : <Check size={24} />}
                  </div>
                  <h3 className="font-bold text-lg text-slate-800 mb-2">{confirmDialog.title}</h3>
                  <p className="text-sm text-slate-500 mb-6 leading-relaxed">{confirmDialog.message}</p>
                  <div className="flex gap-3 justify-center">
                    <button 
                      onClick={closeConfirmDialog}
                      className="px-4 py-2.5 text-sm font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-xl transition-colors w-1/2"
                    >
                      Batal
                    </button>
                    <button 
                      onClick={confirmDialog.onConfirm}
                      className={`px-4 py-2.5 text-sm font-bold text-white rounded-xl transition-colors shadow-md w-1/2 ${
                        confirmDialog.actionColor === 'rose' ? 'bg-rose-500 hover:bg-rose-600' : 'bg-indigo-600 hover:bg-indigo-700'
                      }`}
                    >
                      {confirmDialog.actionText}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* MODAL: PINDAH KATEGORI */}
          {moveDialog.isOpen && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-[80]">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden animate-[fadeIn_0.15s_ease-out] border border-slate-100">
                <div className="px-6 py-4 border-b border-gray-100 bg-slate-50 flex items-center gap-2">
                  <FolderIcon size={18} />
                  <h3 className="font-bold text-lg text-slate-800">Pindahkan Quote</h3>
                </div>
                <div className="p-6">
                  <label className="text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-2 block">Pilih Kategori Tujuan</label>
                  <select
                    className="w-full bg-white border border-slate-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm font-bold text-slate-700 mb-6"
                    value={moveDialog.targetCategory}
                    onChange={(e) => setMoveDialog(prev => ({ ...prev, targetCategory: e.target.value }))}
                  >
                    <option value="" disabled>-- Pilih Kategori --</option>
                    {categories.filter(c => !c.isVirtual).map(c => (
                      <option key={c.id} value={c.id}>{c.name}</option>
                    ))}
                  </select>
                  <div className="flex gap-3 justify-end">
                    <button 
                      onClick={() => setMoveDialog({ isOpen: false, quoteId: null, targetCategory: '' })}
                      className="px-4 py-2.5 text-sm font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-xl transition-colors w-1/2"
                    >
                      Batal
                    </button>
                    <button 
                      onClick={async () => {
                          if (!moveDialog.targetCategory) return;
                          try {
                              await updateDoc(doc(db, 'quotes', moveDialog.quoteId), { categoryId: moveDialog.targetCategory });
                              setMoveDialog({ isOpen: false, quoteId: null, targetCategory: '' });
                          } catch(e) {
                              alert("Gagal memindah quote: " + e.message);
                          }
                      }}
                      className="px-4 py-2.5 text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-xl transition-colors shadow-md w-1/2"
                    >
                      Pindahkan
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</body>
</html>
